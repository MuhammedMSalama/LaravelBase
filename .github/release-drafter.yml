name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'bug'
      - 'fix'
  - title: '📚 Documentation'
    labels:
      - 'documentation'
      - 'docs'
  - title: '🏗 CI/CD'
    labels:
      - 'ci'
  - title: '📦 Dependencies'
    labels:
      - 'dependencies'
  - title: '♻️ Refactoring'
    labels:
      - 'refactor'
      - 'refactoring'

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - 'breaking-change'
  minor:
    labels:
      - 'feature'
      - 'enhancement'
  patch:
    labels:
      - 'bug'
      - 'fix'
      - 'documentation'
      - 'docs'
      - 'ci'
      - 'dependencies'
      - 'refactor'
      - 'refactoring'
  default: patch

exclude-labels:
  - 'skip-changelog'

template: |
  ## Changes

  $CHANGES

  **Full Changelog**: https://github.com/MuhammedMSalama/LaravelBase/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
